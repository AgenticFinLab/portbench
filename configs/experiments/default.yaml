# PortBench batch experiment config.
#
# Output layout:
#   EXPERIMENTS/{rebalance}/{provider}/{model}/{timestamp}/{profile}/{scenario}/
#
# One "run" = one model × all profiles. Each model gets its own timestamp directory.
# Cross-model comparison figures are written to EXPERIMENTS/{rebalance}/comparison_figures/.

# Optional human-readable label stored in run metadata (not used for directory naming).
# Supports {models}, {rebalance}, {date}, {time} placeholders.
batch_id: "{models}_{rebalance}_{date}"

data_provider: processed
data_dir: datasets/processed
sec_dir: datasets/sec
rebalance: monthly           # weekly | monthly | quarterly  →  Level 1 directory
initial_nav: 1000000
workers_per_experiment: 3    # concurrent stress scenarios per profile
parallel_experiments: 1      # concurrent model runs
seed: 42

models:
  - provider: tencent        # uses TENCENT_API_KEY/_BASE_URL/_MODEL
  - provider: deepseek       # uses DEEPSEEK_API_KEY/_BASE_URL/_MODEL
  - provider: kimi           # uses KIMI_API_KEY/_BASE_URL/_MODEL
  - provider: glm            # uses GLM_API_KEY/_BASE_URL/_MODEL
  - provider: ark            # uses ARK_API_KEY/_BASE_URL/_MODEL
  # - baseline: equal_weight # reference baseline (no API)

profiles: [conservative, balanced, aggressive]
stress_scenarios: all
run_normal: true
normal_period:
  start: 2024-01-01
  end: 2024-12-31

logging:
  save_pipeline_logs: true
  save_snapshots: true
  save_figures: true

on_error: isolate
output_root: EXPERIMENTS
timeout: 120                 # per-request LLM timeout in seconds
propagation_weight: 0.1      # CEPS cascade penalty weight
reuse_latest: true          # true = skip models that already have results in EXPERIMENTS/{rebalance}/{provider}/{model}/

run_qa: false                # true = run QA dataset evaluation for LLM models

qa:
  dataset_path: datasets/qa_dataset
  split: test                # train | val | test | all
  templates: [T1, T2, T3, T4, T5, T6, T7]
  max_pairs_per_template: 50
  parallel_questions: 4
  save_responses: true
